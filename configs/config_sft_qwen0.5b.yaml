model:
  name_or_path: "Qwen/Qwen2.5-1.5B-Instruct"
  torch_dtype: "bfloat16"

sft:
  output_file: "sft_llm_data.json"
  output_dir: "outputs/sft_qwen_1.5b"

sft_training:
  learning_rate: 2.0e-5
  num_train_epochs: 3
  bf16: true
  logging_steps: 10
  batch_size: 4
  gradient_accumulation_steps: 4
  save_strategy: "epoch"
  report_to: "tensorboard"
